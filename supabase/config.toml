# Configuration Supabase locale (CLI)
# https://supabase.com/docs/guides/local-development/cli/config
#
# Ce fichier décrit la stack Supabase locale lancée par `supabase start`.
# Les valeurs ici sont des défauts raisonnables pour Plan Financier en local.
# Pour la prod, tout passe via le dashboard Supabase + la migration SQL.

project_id = "plan-financier"

[api]
# Schémas exposés via PostgREST. On expose seulement public.
enabled = true
port = 54321
schemas = ["public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[db]
port = 54322
shadow_port = 54320
major_version = 15

[db.pooler]
enabled = false
port = 54329
pool_mode = "transaction"
default_pool_size = 20
max_client_conn = 100

[realtime]
enabled = true

[studio]
enabled = true
port = 54323
api_url = "http://127.0.0.1"

[inbucket]
# Capture des emails de signup/reset en local
enabled = true
port = 54324

[storage]
enabled = true
file_size_limit = "5MiB"

[auth]
enabled = true
site_url = "http://localhost:5173"
additional_redirect_urls = ["http://localhost:5173"]
jwt_expiry = 3600
enable_signup = true
# Note: la confirmation par email se règle sous [auth.email] (ci-dessous),
# pas ici. Toute clé `enable_confirmations` au niveau [auth] est ignorée.

[auth.email]
enable_signup = true
double_confirm_changes = true
enable_confirmations = false  # mettre true en prod

[auth.external.google]
enabled = false   # à activer + remplir client_id/secret pour Sign-in Google
client_id   = ""
secret      = ""
redirect_uri = ""

[edge_runtime]
enabled = true
inspector_port = 8083

[analytics]
enabled = false
